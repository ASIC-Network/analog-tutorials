<body>

<header class="nav">

      </svg>
      <span>
        <span class="wm">ASIC NETWORK</span>
        <span class="sub" id="brand-sub">docs</span>

      <a id="nav-repo" href="#" target="_blank" rel="noopener">GitHub</a>
    </nav>
  </div>

<div class="toolbar">
  <button id="drawer-btn" class="tb-btn" type="button">&#9776; Pages</button>

<div class="backdrop" id="backdrop"></div>

  <main>
    <div class="doc-meta" id="doc-meta" style="display:none"></div>
    <article class="md" id="content">
      <div class="sk" style="width:55%;height:30px"></div>
      <div class="sk" style="width:95%"></div>
      <div class="sk" style="width:88%"></div>
      <div class="sk" style="width:92%"></div>
      <div class="sk" style="width:40%"></div>
    </article>
    <nav class="pager" id="pager"></nav>
  </main>

  <aside class="toc" id="toc">

    <nav id="toc-nav"></nav>
  </aside>
</div>

<footer>
  <div class="row">
